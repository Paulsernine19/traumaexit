  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"fc59beb0-291f-43c5-bc7b-370dc0e1ff83\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n\n<style>\n*{box-sizing:border-box;}\nhtml,body{margin:0;padding:0;}\nbody{background:#EFECE6;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}\n@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}\n@keyframes popIn{from{opacity:0;transform:scale(.94);}to{opacity:1;transform:none;}}\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"min-height:100vh;background:#EFECE6;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Helvetica,Arial,sans-serif;color:#16181C;padding:clamp(14px,4vw,44px) 14px 72px;display:flex;justify-content:center;--accent:{{ accentMain }};--accentDark:{{ accentDark }};\">\n <div style=\"width:100%;max-width:800px;\">\n\n  <div style=\"display:flex;align-items:center;gap:11px;margin-bottom:22px;\">\n   <div style=\"width:32px;height:32px;border-radius:8px;background:var(--accent,#0F5A5E);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;letter-spacing:.5px;\">EX<\u002Fdiv>\n   <div style=\"font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;font-size:10.5px;letter-spacing:1.6px;color:#6B6E74;text-transform:uppercase;\">EXIT Project · Extrication in Trauma<\u002Fdiv>\n  <\u002Fdiv>\n\n  <sc-if value=\"{{ isIntro }}\" hint-placeholder-val=\"{{ true }}\">\n   <div style=\"background:#fff;border:1px solid #E2DED6;border-radius:20px;padding:clamp(24px,4.5vw,48px);\">\n    <div style=\"font-family:ui-monospace,Menlo,Consolas,monospace;font-size:11px;letter-spacing:2px;color:#B07A1E;text-transform:uppercase;margin-bottom:18px;\">Qatar Ambulance Service · CPD Module<\u002Fdiv>\n    <h1 style=\"font-size:clamp(30px,6.4vw,46px);line-height:1.04;margin:0 0 20px;font-weight:800;letter-spacing:-.02em;\">Evidence-Based Vehicle Extrication<\u002Fh1>\n    <p style=\"font-size:17px;line-height:1.66;color:#3A3D42;margin:0 0 26px;max-width:64ch;\">In this section, we will discuss the extrication of patients in the prehospital setting. This section is based on the EXIT Project — EXtrication In Trauma — conducted by Nutbeam and colleagues between 2021 and 2024. The project reviewed current evidence, analysed trauma registry data, measured spinal movement during different extrication methods, explored patient experience, and produced expert consensus principles for clinical and rescue practice.<\u002Fp>\n\n    <p style=\"font-size:15px;line-height:1.55;color:#63666C;margin:0 0 12px;max-width:62ch;\">Select the title below to learn more about the EXIT Project, then watch the overview video.<\u002Fp>\n\n    <button onclick=\"{{ toggleKnowMore }}\" style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;width:100%;background:#F7F5F0;border:1px solid #E2DED6;border-radius:12px;padding:15px 18px;font-family:inherit;font-size:15px;font-weight:600;color:#16181C;cursor:pointer;text-align:left;\" style-hover=\"border-color:var(--accent,#0F5A5E);\">\n     <span>Know more about the EXIT Project<\u002Fspan>\n     <span style=\"font-size:20px;color:var(--accent,#0F5A5E);font-weight:400;width:20px;text-align:center;\">{{ knowMoreSign }}<\u002Fspan>\n    <\u002Fbutton>\n    <sc-if value=\"{{ knowMore }}\" hint-placeholder-val=\"{{ false }}\">\n     <div style=\"margin-top:-2px;background:#F7F5F0;border:1px solid #E2DED6;border-top:none;border-radius:0 0 12px 12px;padding:6px 18px 18px;\">\n      <p style=\"font-size:15px;line-height:1.62;color:#3A3D42;margin:8px 0 0;\">The EXIT Project included 10 studies designed to create an evidence base for vehicle extrication. These studies examined what is known, what is assumed, patient outcomes, spinal movement, self-extrication, patient experience, and expert consensus.<\u002Fp>\n     <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <div style=\"margin:26px 0 28px;\">\n     <div style=\"font-family:ui-monospace,Menlo,Consolas,monospace;font-size:10.5px;letter-spacing:1.4px;color:#8A8D93;text-transform:uppercase;margin-bottom:9px;\">Overview video · video/exit-overview.mp4<\u002Fdiv>\n     <div style=\"position:relative;border-radius:14px;overflow:hidden;border:1px solid #E2DED6;background:repeating-linear-gradient(135deg,#151A1C,#151A1C 11px,#1B2123 11px,#1B2123 22px);\">\n      <video controls=\"controls\" preload=\"metadata\" playsinline=\"\" poster=\"b13311c0-ae6e-4d1e-b206-1fec24ca5723\" style=\"width:100%;display:block;aspect-ratio:16/9;background:transparent;\">\n       <source src=\"video/exit-overview.mp4\" type=\"video/mp4\">\n       Your browser does not support the video tag.\n      <\u002Fvideo>\n     <\u002Fdiv>\n    <\u002Fdiv>\n\n    <button onclick=\"{{ start }}\" style=\"display:inline-flex;align-items:center;justify-content:center;gap:9px;width:100%;background:var(--accent,#0F5A5E);color:#fff;border:none;border-radius:13px;padding:16px 24px;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;letter-spacing:.01em;\" style-hover=\"background:var(--accentDark,#0B4448);\">Start Evidence Challenge →<\u002Fbutton>\n   <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ isStudy }}\" hint-placeholder-val=\"{{ false }}\">\n   <div style=\"\">\n    <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px;flex-wrap:wrap;\">\n     <div style=\"font-family:ui-monospace,Menlo,Consolas,monospace;font-size:11px;letter-spacing:1.8px;color:var(--accent,#0F5A5E);text-transform:uppercase;\">Study {{ studyNum }} <span style=\"color:#B3AFA6;\">/ {{ studyTotal }}<\u002Fspan><\u002Fdiv>\n     <a href=\"{{ pdfHref }}\" download=\"{{ pdfDownloadName }}\" style=\"display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;color:#63666C;text-decoration:none;border:1px solid #D8D3CA;border-radius:20px;padding:6px 13px;background:#fff;\" style-hover=\"border-color:var(--accent,#0F5A5E);color:var(--accent,#0F5A5E);\">↓ Dig deeper · PDF<\u002Fa>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:5px;margin-bottom:24px;\">\n     <sc-for list=\"{{ stepDots }}\" as=\"d\" hint-placeholder-count=\"10\">\n      <div style=\"height:5px;flex:1;border-radius:3px;background:{{ d.bg }};\"><\u002Fdiv>\n     <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <h2 style=\"font-size:clamp(24px,4.6vw,32px);line-height:1.1;margin:0 0 8px;font-weight:800;letter-spacing:-.015em;\">{{ studyTitle }}<\u002Fh2>\n    <p style=\"font-size:16px;color:#6B6E74;margin:0 0 28px;line-height:1.5;\">{{ studySubtitle }}<\u002Fp>\n\n    <div style=\"font-family:ui-monospace,Menlo,Consolas,monospace;font-size:10.5px;letter-spacing:1.6px;color:#8A8D93;text-transform:uppercase;margin-bottom:14px;\">Evidence check · backed or not backed?<\u002Fdiv>\n\n    <sc-for list=\"{{ statements }}\" as=\"s\" hint-placeholder-count=\"1\">\n     <div style=\"background:#fff;border:1px solid #E2DED6;border-radius:16px;padding:20px 22px;margin-bottom:16px;\">\n      <div style=\"font-family:ui-monospace,Menlo,Consolas,monospace;font-size:10.5px;letter-spacing:1.2px;color:var(--accent,#0F5A5E);text-transform:uppercase;margin-bottom:10px;\">Statement {{ s.idxLabel }}<\u002Fdiv>\n      <p style=\"font-size:17px;line-height:1.5;margin:0 0 16px;font-weight:500;color:#1D2024;\">“{{ s.text }}”<\u002Fp>\n      <sc-if value=\"{{ s.showButtons }}\" hint-placeholder-val=\"{{ true }}\">\n       <div style=\"display:flex;gap:10px;flex-wrap:wrap;\">\n        <button onclick=\"{{ s.onBacked }}\" style=\"flex:1;min-width:150px;background:#fff;color:#16181C;border:1px solid #D8D3CA;border-radius:11px;padding:13px 14px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;line-height:1.3;\" style-hover=\"border-color:#2F7A55;background:#E6F1EA;color:#1F5A3C;\">Backed by evidence<\u002Fbutton>\n        <button onclick=\"{{ s.onNotBacked }}\" style=\"flex:1;min-width:150px;background:#fff;color:#16181C;border:1px solid #D8D3CA;border-radius:11px;padding:13px 14px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;line-height:1.3;\" style-hover=\"border-color:#B0432F;background:#F6E7E2;color:#8A3222;\">Not backed by evidence<\u002Fbutton>\n       <\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ s.answered }}\" hint-placeholder-val=\"{{ false }}\">\n       <div style=\"margin-top:14px;background:#F7F5F0;border:1px solid #E2DED6;border-left:3px solid var(--accent,#0F5A5E);border-radius:10px;padding:14px 16px;\">\n        <sc-if value=\"{{ s.userCorrect }}\" hint-placeholder-val=\"{{ false }}\">\n         <span style=\"display:inline-block;background:#E6F1EA;color:#2F7A55;font-size:12px;font-weight:700;padding:3px 11px;border-radius:20px;margin-bottom:9px;\">✓ Correct<\u002Fspan>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ s.userWrong }}\" hint-placeholder-val=\"{{ false }}\">\n         <span style=\"display:inline-block;background:#F6E7E2;color:#B0432F;font-size:12px;font-weight:700;padding:3px 11px;border-radius:20px;margin-bottom:9px;\">× Not quite<\u002Fspan>\n        <\u002Fsc-if>\n        <div style=\"font-size:13px;color:#63666C;margin-bottom:7px;\">Evidence verdict: <strong style=\"color:#1D2024;\">{{ s.verdictLabel }}<\u002Fstrong><\u002Fdiv>\n        <p style=\"font-size:14.5px;line-height:1.55;color:#3A3D42;margin:0;\">{{ s.feedback }}<\u002Fp>\n        <sc-if value=\"{{ s.retryHint }}\" hint-placeholder-val=\"{{ false }}\">\n         <p style=\"font-size:13px;color:#B07A1E;margin:9px 0 0;font-weight:600;\">Try again — choose the correct verdict to continue.<\u002Fp>\n        <\u002Fsc-if>\n       <\u002Fdiv>\n      <\u002Fsc-if>\n     <\u002Fdiv>\n    <\u002Fsc-for>\n\n    <sc-if value=\"{{ notRevealed }}\" hint-placeholder-val=\"{{ false }}\">\n     <sc-if value=\"{{ canReveal }}\" hint-placeholder-val=\"{{ false }}\">\n      <button onclick=\"{{ doReveal }}\" style=\"display:inline-flex;align-items:center;justify-content:center;gap:9px;width:100%;background:#FBF6EA;color:#8A5E12;border:1px solid #E4CC8A;border-radius:13px;padding:15px 22px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:4px;\" style-hover=\"background:#F6EDD6;\">Reveal Key Findings ↓<\u002Fbutton>\n     <\u002Fsc-if>\n     <sc-if value=\"{{ revealLocked }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"text-align:center;color:#8A8D93;font-size:13.5px;padding:14px;border:1px dashed #D8D3CA;border-radius:12px;margin-top:4px;\">Answer the statement(s) above to reveal the key findings.<\u002Fdiv>\n     <\u002Fsc-if>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ revealed }}\" hint-placeholder-val=\"{{ false }}\">\n     <div style=\"\">\n      <div style=\"background:#FBF6EA;border:1px solid #EBD9B0;border-radius:16px;padding:22px 24px;margin-top:4px;\">\n       <div style=\"font-family:ui-monospace,Menlo,Consolas,monospace;font-size:10.5px;letter-spacing:1.6px;color:#B07A1E;text-transform:uppercase;margin-bottom:14px;\">Key findings<\u002Fdiv>\n       <sc-for list=\"{{ keyFindings }}\" as=\"k\" hint-placeholder-count=\"4\">\n        <div style=\"display:flex;gap:13px;align-items:flex-start;margin-bottom:12px;\">\n         <span style=\"flex-shrink:0;width:22px;height:22px;border-radius:6px;background:#EFD9A6;color:#8A5E12;font-weight:700;font-size:11px;display:flex;align-items:center;justify-content:center;margin-top:1px;\">{{ k.n }}<\u002Fspan>\n         <span style=\"font-size:15px;line-height:1.5;color:#4A3B18;\">{{ k.text }}<\u002Fspan>\n        <\u002Fdiv>\n       <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"margin-top:26px;\">\n       <div style=\"font-family:ui-monospace,Menlo,Consolas,monospace;font-size:10.5px;letter-spacing:1.6px;color:var(--accent,#0F5A5E);text-transform:uppercase;margin-bottom:6px;\">On scene<\u002Fdiv>\n       <p style=\"font-size:18px;font-weight:700;line-height:1.35;margin:0 0 16px;color:#1D2024;\">What does this finding mean on scene?<\u002Fp>\n       <sc-for list=\"{{ onSceneOptions }}\" as=\"o\" hint-placeholder-count=\"4\">\n        <sc-if value=\"{{ o.neutral }}\" hint-placeholder-val=\"{{ true }}\">\n         <button onclick=\"{{ o.onSelect }}\" style=\"display:flex;gap:13px;align-items:flex-start;width:100%;text-align:left;background:#fff;border:1px solid #D8D3CA;border-radius:12px;padding:15px 16px;font-size:14.5px;line-height:1.5;font-family:inherit;color:#16181C;cursor:pointer;margin-bottom:11px;\" style-hover=\"border-color:var(--accent,#0F5A5E);background:#F3F7F6;\">\n          <span style=\"flex-shrink:0;width:24px;height:24px;border-radius:7px;background:#EFECE6;color:#63666C;font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:center;\">{{ o.letter }}<\u002Fspan>\n          <span>{{ o.text }}<\u002Fspan>\n         <\u002Fbutton>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ o.correctGreen }}\" hint-placeholder-val=\"{{ false }}\">\n         <div style=\"display:flex;gap:13px;align-items:flex-start;width:100%;background:#E6F1EA;border:1px solid #2F7A55;border-radius:12px;padding:15px 16px;font-size:14.5px;line-height:1.5;color:#1F5A3C;margin-bottom:11px;\">\n          <span style=\"flex-shrink:0;width:24px;height:24px;border-radius:7px;background:#2F7A55;color:#fff;font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;\">✓<\u002Fspan>\n          <span>{{ o.text }}<\u002Fspan>\n         <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ o.wrongRed }}\" hint-placeholder-val=\"{{ false }}\">\n         <button onclick=\"{{ o.onSelect }}\" style=\"display:flex;gap:13px;align-items:flex-start;width:100%;text-align:left;background:#F6E7E2;border:1px solid #B0432F;border-radius:12px;padding:15px 16px;font-size:14.5px;line-height:1.5;font-family:inherit;color:#8A3222;cursor:pointer;margin-bottom:11px;\">\n          <span style=\"flex-shrink:0;width:24px;height:24px;border-radius:7px;background:#B0432F;color:#fff;font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;\">×<\u002Fspan>\n          <span>{{ o.text }}<\u002Fspan>\n         <\u002Fbutton>\n        <\u002Fsc-if>\n       <\u002Fsc-for>\n\n       <sc-if value=\"{{ onSceneSolved }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"background:#E6F1EA;border-radius:10px;padding:12px 15px;font-size:14px;color:#1F5A3C;font-weight:600;margin-top:2px;\">Correct — this is the best on-scene application. You can continue.<\u002Fdiv>\n       <\u002Fsc-if>\n       <sc-if value=\"{{ onSceneTriedWrong }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"background:#FBF6EA;border-radius:10px;padding:12px 15px;font-size:14px;color:#8A5E12;font-weight:600;margin-top:2px;\">Not the best fit. Re-read the key findings and choose again.<\u002Fdiv>\n       <\u002Fsc-if>\n      <\u002Fdiv>\n     <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <div style=\"display:flex;gap:12px;align-items:center;justify-content:space-between;margin-top:30px;flex-wrap:wrap;\">\n     <a href=\"{{ pdfHref }}\" download=\"{{ pdfDownloadName }}\" style=\"display:inline-flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:#63666C;text-decoration:none;border:1px solid #D8D3CA;border-radius:11px;padding:12px 18px;background:#fff;\" style-hover=\"border-color:var(--accent,#0F5A5E);color:var(--accent,#0F5A5E);\">↓ Download Study {{ studyNum }}<\u002Fa>\n     <sc-if value=\"{{ nextReady }}\" hint-placeholder-val=\"{{ false }}\">\n      <button onclick=\"{{ next }}\" style=\"display:inline-flex;align-items:center;justify-content:center;gap:9px;background:var(--accent,#0F5A5E);color:#fff;border:none;border-radius:12px;padding:14px 26px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;flex:1;min-width:180px;\" style-hover=\"background:var(--accentDark,#0B4448);\">{{ nextLabel }} →<\u002Fbutton>\n     <\u002Fsc-if>\n     <sc-if value=\"{{ nextDisabled }}\" hint-placeholder-val=\"{{ true }}\">\n      <button disabled=\"\" style=\"display:inline-flex;align-items:center;justify-content:center;gap:9px;background:#E4E0D8;color:#A8A49B;border:none;border-radius:12px;padding:14px 26px;font-size:15px;font-weight:700;font-family:inherit;cursor:not-allowed;flex:1;min-width:180px;\">{{ nextLabel }} →<\u002Fbutton>\n     <\u002Fsc-if>\n    <\u002Fdiv>\n    <sc-if value=\"{{ nextDisabled }}\" hint-placeholder-val=\"{{ true }}\">\n     <div style=\"text-align:right;color:#8A8D93;font-size:12.5px;margin-top:8px;\">Complete the on-scene question to continue.<\u002Fdiv>\n    <\u002Fsc-if>\n   <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ isFinal }}\" hint-placeholder-val=\"{{ false }}\">\n   <div style=\"\">\n    <div style=\"font-family:ui-monospace,Menlo,Consolas,monospace;font-size:11px;letter-spacing:1.8px;color:var(--accent,#0F5A5E);text-transform:uppercase;margin-bottom:10px;\">Final knowledge check<\u002Fdiv>\n    <h2 style=\"font-size:clamp(26px,5vw,34px);line-height:1.08;margin:0 0 10px;font-weight:800;letter-spacing:-.015em;\">Did the EXIT messages land?<\u002Fh2>\n    <p style=\"font-size:16px;color:#6B6E74;margin:0 0 24px;line-height:1.5;\">Answer all ten. You must score <strong style=\"color:#1D2024;\">100%<\u002Fstrong> to complete this module — any wrong answer means a retry.<\u002Fp>\n\n    <sc-for list=\"{{ finalQuestions }}\" as=\"q\" hint-placeholder-count=\"10\">\n     <div style=\"background:#fff;border:1px solid #E2DED6;border-radius:14px;padding:18px 20px;margin-bottom:13px;\">\n      <div style=\"display:flex;gap:12px;align-items:flex-start;margin-bottom:14px;\">\n       <span style=\"flex-shrink:0;width:24px;height:24px;border-radius:7px;background:#EFECE6;color:#63666C;font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:center;margin-top:1px;\">{{ q.n }}<\u002Fspan>\n       <p style=\"font-size:15.5px;line-height:1.5;margin:0;font-weight:500;color:#1D2024;\">{{ q.text }}<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:10px;\">\n       <button onclick=\"{{ q.onTrue }}\" disabled=\"{{ q.locked }}\" style=\"{{ q.trueStyle }}\">True<\u002Fbutton>\n       <button onclick=\"{{ q.onFalse }}\" disabled=\"{{ q.locked }}\" style=\"{{ q.falseStyle }}\">False<\u002Fbutton>\n      <\u002Fdiv>\n      <sc-if value=\"{{ q.showFeedback }}\" hint-placeholder-val=\"{{ false }}\">\n       <div style=\"margin-top:13px;background:#F6E7E2;border-left:3px solid #B0432F;border-radius:8px;padding:11px 14px;font-size:14px;line-height:1.5;color:#8A3222;\">{{ q.feedback }}<\u002Fdiv>\n      <\u002Fsc-if>\n     <\u002Fdiv>\n    <\u002Fsc-for>\n\n    <sc-if value=\"{{ submitReady }}\" hint-placeholder-val=\"{{ false }}\">\n     <button onclick=\"{{ submitFinal }}\" style=\"display:inline-flex;align-items:center;justify-content:center;gap:9px;width:100%;background:var(--accent,#0F5A5E);color:#fff;border:none;border-radius:13px;padding:16px 24px;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:6px;\" style-hover=\"background:var(--accentDark,#0B4448);\">Submit answers<\u002Fbutton>\n    <\u002Fsc-if>\n    <sc-if value=\"{{ submitLocked }}\" hint-placeholder-val=\"{{ true }}\">\n     <button disabled=\"\" style=\"display:inline-flex;align-items:center;justify-content:center;gap:9px;width:100%;background:#E4E0D8;color:#A8A49B;border:none;border-radius:13px;padding:16px 24px;font-size:16px;font-weight:700;font-family:inherit;cursor:not-allowed;margin-top:6px;\">Answer all ten to submit<\u002Fbutton>\n    <\u002Fsc-if>\n    <sc-if value=\"{{ finalShowRetry }}\" hint-placeholder-val=\"{{ false }}\">\n     <div style=\"background:#F6E7E2;border:1px solid #E3B9AC;border-radius:14px;padding:20px 22px;margin-top:6px;text-align:center;\">\n      <div style=\"font-size:17px;font-weight:700;color:#8A3222;margin-bottom:6px;\">You scored {{ finalScore }} / 10<\u002Fdiv>\n      <p style=\"font-size:14.5px;color:#8A3222;margin:0 0 16px;line-height:1.5;\">Review the highlighted questions and their feedback, then try again. 100% is required to complete.<\u002Fp>\n      <button onclick=\"{{ retryFinal }}\" style=\"display:inline-flex;align-items:center;justify-content:center;gap:8px;background:#B0432F;color:#fff;border:none;border-radius:11px;padding:13px 28px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;\" style-hover=\"background:#8A3222;\">Try again<\u002Fbutton>\n     <\u002Fdiv>\n    <\u002Fsc-if>\n   <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ isComplete }}\" hint-placeholder-val=\"{{ false }}\">\n   <div style=\"background:#fff;border:1px solid #E2DED6;border-radius:20px;padding:clamp(30px,5vw,56px) clamp(24px,4vw,44px);text-align:center;\">\n    <div style=\"width:76px;height:76px;border-radius:50%;background:#E6F1EA;color:#2F7A55;font-size:38px;display:flex;align-items:center;justify-content:center;margin:0 auto 22px;\">✓<\u002Fdiv>\n    <div style=\"font-family:ui-monospace,Menlo,Consolas,monospace;font-size:11px;letter-spacing:2px;color:#2F7A55;text-transform:uppercase;margin-bottom:14px;\">Module complete<\u002Fdiv>\n    <h2 style=\"font-size:clamp(24px,4.6vw,30px);line-height:1.2;margin:0 0 12px;font-weight:800;letter-spacing:-.01em;\">Section complete. You have passed the EXIT evidence check.<\u002Fh2>\n    <p style=\"font-size:16px;color:#6B6E74;margin:0 0 28px;line-height:1.55;max-width:52ch;margin-left:auto;margin-right:auto;\">10 EXIT studies explored · 10/10 on the final knowledge check. Apply this evidence alongside your local clinical practice guidelines.<\u002Fp>\n    <button onclick=\"{{ restart }}\" style=\"display:inline-flex;align-items:center;justify-content:center;gap:8px;background:#fff;color:var(--accent,#0F5A5E);border:1px solid var(--accent,#0F5A5E);border-radius:12px;padding:13px 28px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;\" style-hover=\"background:#F3F7F6;\">Review from the start<\u002Fbutton>\n   <\u002Fdiv>\n  <\u002Fsc-if>\n\n <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:840,&quot;height&quot;:900},&quot;theme&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:[&quot;#0F5A5E&quot;,&quot;#0B4448&quot;],&quot;options&quot;:[[&quot;#0F5A5E&quot;,&quot;#0B4448&quot;],[&quot;#2A5C8A&quot;,&quot;#1E4266&quot;],[&quot;#7A3E86&quot;,&quot;#5E2E68&quot;],[&quot;#A85320&quot;,&quot;#823F18&quot;]],&quot;tsType&quot;:&quot;string[]&quot;,&quot;section&quot;:&quot;Theme&quot;},&quot;requireStatementMastery&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Behaviour&quot;}}\">\nconst LBL = { backed: 'Backed by evidence', notbacked: 'Not backed by evidence' };\n\nconst STUDIES = [\n  {\n    title: 'Extrication of patients trapped following a motor vehicle collision: a systematic scoping review of the literature',\n    subtitle: 'What did the evidence actually say before EXIT?',\n    pdf: 'studies/study-1-scoping-review.pdf', dl: 'study-1-scoping-review.pdf',\n    statements: [\n      { text: 'The traditional zero-movement approach to extrication is strongly supported by high-quality patient outcome evidence.', correct: 'notbacked', feedback: 'The EXIT scoping review found that many traditional extrication principles were based on historical practice, expert opinion, and assumptions rather than strong clinical outcome evidence.' },\n      { text: 'Spinal cord injury is one of the most common life-threatening injuries in motor vehicle crash fatalities.', correct: 'notbacked', feedback: 'EXIT highlighted that spinal cord injury is relatively uncommon compared with head, chest, abdominal, pelvic, and major haemorrhage-related injuries.' },\n      { text: 'Many patients described as \\u2018trapped\\u2019 may be held in the vehicle because of clinical concern rather than true physical entrapment.', correct: 'backed', feedback: 'EXIT identified that many patients are not physically trapped by wreckage but are effectively kept in place by clinical or procedural concerns.' }\n    ],\n    keyFindings: [\n      'Traditional \\u201Czero movement\\u201D extrication practice was not strongly supported by patient-outcome evidence.',\n      'Spinal cord injury is uncommon compared with other major trauma causes of death.',\n      'Many patients may be \\u201Cmedically trapped\\u201D rather than physically trapped.',\n      'The evidence base before EXIT was limited, which created a need for better research.'\n    ],\n    options: [\n      { text: 'All patients in crashed vehicles must wait for full technical extrication.', correct: false },\n      { text: 'First assess whether the patient is physically trapped, clinically unstable, able to follow instructions, and able to assist with movement. Protect the spine, but do not let spinal concern automatically override time-critical trauma care.', correct: true },\n      { text: 'Spinal precautions are no longer required.', correct: false },\n      { text: 'The patient should always self-extricate regardless of condition.', correct: false }\n    ]\n  },\n  {\n    title: 'Entrapment Outcomes \\u00B7 TARN Registry',\n    subtitle: 'What actually happens to trapped patients?',\n    pdf: 'studies/study-2-entrapment-outcomes.pdf', dl: 'study-2-entrapment-outcomes.pdf',\n    statements: [\n      { text: 'A trapped patient should be treated as time-critical until proven otherwise.', correct: 'backed', feedback: 'The EXIT registry analysis found that trapped patients had worse outcomes compared with non-trapped patients.' }\n    ],\n    keyFindings: [\n      'Trapped patients had higher mortality.',\n      'Trapped patients had more severe injuries.',\n      'Spinal cord injury was rare compared with other critical injuries.',\n      'Delay may be harmful in major trauma.'\n    ],\n    options: [\n      { text: 'Entrapment has no effect on outcome, so proceed at a routine pace.', correct: false },\n      { text: 'Wait for full technical extrication before any assessment or intervention.', correct: false },\n      { text: 'If the patient is trapped, start thinking early about time, resources, rescue access, haemorrhage, airway, chest injury, pelvic injury, and destination. Avoid unnecessary delays before transport.', correct: true },\n      { text: 'Trapped patients are stable by definition and can be a lower triage priority.', correct: false }\n    ]\n  },\n  {\n    title: 'Sex Differences in Entrapment & Injury',\n    subtitle: 'Do entrapment rates and injury patterns differ?',\n    pdf: 'studies/study-3-sex-differences.pdf', dl: 'study-3-sex-differences.pdf',\n    statements: [\n      { text: 'Male and female patients have the same entrapment risk and injury patterns.', correct: 'notbacked', feedback: 'The EXIT data showed differences in entrapment rates and injury patterns between male and female patients.' }\n    ],\n    keyFindings: [\n      'Female patients had a higher rate of entrapment.',\n      'Injury patterns differed between male and female patients. Trapped males: more head and chest trauma. Trapped females: higher rates of pelvic fractures (~14.6% vs 9.7%) and spinal injuries.',\n      'Seating position matters. Women often sit closer to the wheel for reach, increasing risk of pelvic/lower extremity injury from the dashboard in a collision.'\n    ],\n    options: [\n      { text: 'Do not reduce urgency based on sex. Maintain a high index of suspicion for different injury patterns, including pelvic and lower limb injuries, and assess each patient individually.', correct: true },\n      { text: 'Treat male and female patients identically and ignore injury-pattern differences.', correct: false },\n      { text: 'Female patients are always lower risk and can be deprioritised.', correct: false },\n      { text: 'Sex determines outcome, so base triage mainly on the patient\\u2019s sex.', correct: false }\n    ]\n  },\n  {\n    title: 'Ageing & Entrapment',\n    subtitle: 'Is age the deciding factor?',\n    pdf: 'studies/study-4-age-entrapment.pdf', dl: 'study-4-age-entrapment.pdf',\n    statements: [\n      { text: 'Older age alone means assisted self-extrication should not be considered.', correct: 'notbacked', feedback: 'EXIT suggests that age alone is not the decision point. The decision should be based on ability, cognition, injuries, pain, and clinical status.' }\n    ],\n    keyFindings: [\n      'Older trapped patients had higher mortality.',\n      'Older patients may have different injury patterns, including thoracic and spinal fractures.',\n      'Some older patients may still self-extricate safely if alert, cooperative, and physically able.'\n    ],\n    options: [\n      { text: 'Any patient over a set age must always undergo full technical extrication.', correct: false },\n      { text: 'Older patients never deteriorate quickly, so delay is acceptable.', correct: false },\n      { text: 'Use age as the single deciding factor for the extrication method.', correct: false },\n      { text: 'Do not use age alone as the decision point. Assess cognition, pain, strength, limb movement, injury pattern, and ability to follow instructions. Older trapped patients may deteriorate quickly, so avoid unnecessary delay.', correct: true }\n    ]\n  },\n  {\n    title: 'Biomechanical Analysis of Extrication',\n    subtitle: 'How much does the spine actually move?',\n    pdf: 'studies/study-5-biomechanics.pdf', dl: 'study-5-biomechanics.pdf',\n    statements: [\n      { text: 'Self-extrication always causes more spinal movement than crew-led extrication.', correct: 'notbacked', feedback: 'In the EXIT biomechanical study, self-extrication produced less cervical movement and was much faster than several traditional extrication techniques.' }\n    ],\n    keyFindings: [\n      'Self-extrication produced low cervical movement.',\n      'Traditional techniques did not necessarily reduce movement.',\n      'Self-extrication was much faster in the study setting.'\n    ],\n    options: [\n      { text: 'Self-extrication is always dangerous and must never be offered.', correct: false },\n      { text: 'For an alert, cooperative patient who is not physically trapped, assisted self-extrication may be a reasonable option. The decision should be based on patient ability, clinical condition, and scene safety.', correct: true },\n      { text: 'Everyone should self-extricate regardless of injuries or clinical state.', correct: false },\n      { text: 'Crew-led extrication always produces less spinal movement, so never consider self-extrication.', correct: false }\n    ]\n  },\n  {\n    title: 'Self-Extrication Instructions & Collars',\n    subtitle: 'Do detailed commands and collars help?',\n    pdf: 'studies/study-6-self-extrication-collars.pdf', dl: 'study-6-self-extrication-collars.pdf',\n    statements: [\n      { text: 'Detailed step-by-step instructions reduce spinal movement during self-extrication.', correct: 'notbacked', feedback: 'EXIT found that over-instruction may increase movement. Short, calm coaching is preferred.' },\n      { text: 'A cervical collar may reduce peak movement, but it should not delay urgent extrication.', correct: 'backed', feedback: 'Cervical collars may reduce peak movement, but they should not create unnecessary delay when urgent extrication is needed.' }\n    ],\n    keyFindings: [\n      'Detailed instruction may increase cervical movement.',\n      'Short, calm coaching is preferred.',\n      'Collars may reduce peak movement.',\n      'Collars should not delay urgent extrication.'\n    ],\n    options: [\n      { text: 'Give the most detailed possible step-by-step commands for every movement.', correct: false },\n      { text: 'Always fit a collar perfectly before allowing any movement, even if urgent.', correct: false },\n      { text: 'Use short, calm instructions. Do not over-control every movement. Apply a collar if indicated and immediately available, but do not delay extrication just to fetch or fit one.', correct: true },\n      { text: 'Skip communication entirely and let the patient work it out alone.', correct: false }\n    ]\n  },\n  {\n    title: 'Chain Cabling vs Roof Removal',\n    subtitle: 'Speed versus movement in the critical patient.',\n    pdf: 'studies/study-7-chain-cabling.pdf', dl: 'study-7-chain-cabling.pdf',\n    statements: [\n      { text: 'In a critical, physically trapped patient, faster disentanglement may be justified even if it causes slightly more measured spinal movement.', correct: 'backed', feedback: 'EXIT supports a risk-benefit approach. For critical patients, time saved may outweigh small differences in measured spinal movement.' }\n    ],\n    keyFindings: [\n      'Chain cabling was faster than traditional roof removal.',\n      'It caused more spinal movement than roof removal, but the absolute movement remained small.',\n      'In critical trauma, saving time may be more important than achieving the lowest possible movement.'\n    ],\n    options: [\n      { text: 'If the patient is critical, communicate that clearly to rescue teams: \\u201CThis is time-critical; we need the fastest safe route out.\\u201D The paramedic role is to identify urgency and guide the clinical priority.', correct: true },\n      { text: 'Always insist on the technique with the absolute lowest spinal movement, whatever the delay.', correct: false },\n      { text: 'Extrication method is purely a rescue decision; the paramedic should not comment on urgency.', correct: false },\n      { text: 'For every patient, speed matters more than any spinal consideration.', correct: false }\n    ]\n  },\n  {\n    title: 'Travel Metric \\u00B7 Total Spinal Movement',\n    subtitle: 'Is peak movement the only thing that matters?',\n    pdf: 'studies/study-8-travel-metric.pdf', dl: 'study-8-travel-metric.pdf',\n    statements: [\n      { text: 'Only the largest single spinal movement matters during extrication.', correct: 'notbacked', feedback: 'EXIT introduced the idea that total cumulative movement also matters, not only the biggest single movement.' }\n    ],\n    keyFindings: [\n      'Peak movement and total travel are different.',\n      'Repeated small movements may add up.',\n      'Smooth, coordinated, continuous movement is better than repeated stop-start movement.',\n      'Collars may reduce peak movement but not total travel.'\n    ],\n    options: [\n      { text: 'Only avoid the single biggest movement; lots of small adjustments are harmless.', correct: false },\n      { text: 'Reposition the patient as many times as needed; cumulative movement does not matter.', correct: false },\n      { text: 'A collar removes the need to worry about total movement, so move freely.', correct: false },\n      { text: 'Avoid repeated unnecessary repositioning. Aim for smooth, coordinated movement from vehicle to stretcher.', correct: true }\n    ]\n  },\n  {\n    title: 'Patient Experience',\n    subtitle: 'What does extrication feel like for the patient?',\n    pdf: 'studies/study-9-patient-experience.pdf', dl: 'study-9-patient-experience.pdf',\n    statements: [\n      { text: 'Communication, pain relief, and dignity can wait until after extrication.', correct: 'notbacked', feedback: 'EXIT showed that communication, pain control, and dignity strongly affect the patient\\u2019s experience and may reduce distress.' }\n    ],\n    keyFindings: [\n      'Silence increased fear.',\n      'Patients valued one rescuer staying with them.',\n      'Pain during extrication could be traumatic.',\n      'Bystanders filming caused distress and humiliation.'\n    ],\n    options: [\n      { text: 'Focus only on the technical rescue; communication and dignity can wait until hospital.', correct: false },\n      { text: 'Assign someone to stay with the patient when possible. Explain what is happening, monitor pain, reduce panic, and protect the patient from unnecessary exposure or filming.', correct: true },\n      { text: 'Bystander filming is harmless, so it does not need to be managed.', correct: false },\n      { text: 'Pain relief during extrication is unnecessary and can always be delayed.', correct: false }\n    ]\n  },\n  {\n    title: 'Delphi Consensus',\n    subtitle: 'Turning the evidence into shared principles.',\n    pdf: 'studies/study-10-delphi-consensus.pdf', dl: 'study-10-delphi-consensus.pdf',\n    statements: [\n      { text: 'Modern extrication should focus on patient outcome, reduced entrapment time, selected self-extrication, and essential interventions only.', correct: 'backed', feedback: 'The Delphi consensus translated the EXIT evidence into practical clinical and rescue principles.' }\n    ],\n    keyFindings: [\n      'Minimise entrapment time.',\n      'Self-extrication or minimally assisted extrication is Plan A for suitable patients.',\n      'Keep on-scene interventions to essential life-saving actions.',\n      'Use a patient-centred approach.',\n      'Use shared principles between EMS and rescue teams.'\n    ],\n    options: [\n      { text: 'Perform as many on-scene interventions as possible before moving the patient.', correct: false },\n      { text: 'Ignore entrapment time; the method matters more than the clock.', correct: false },\n      { text: 'Use a patient-centred, time-aware approach. Do only essential life-saving interventions before or during extrication, then move toward definitive care.', correct: true },\n      { text: 'Use a rescue-led approach where clinical priorities are secondary.', correct: false }\n    ]\n  }\n];\n\nconst FINAL = [\n  { text: 'The traditional zero-movement approach to extrication is strongly supported by high-quality patient outcome evidence.', answer: 'false', feedback: 'EXIT found that many traditional extrication assumptions were not strongly supported by clinical outcome evidence.' },\n  { text: 'A patient can be considered trapped even when they are not physically trapped by the vehicle structure.', answer: 'true', feedback: 'Some patients are effectively medically trapped because responders keep them in place due to clinical concern or protocol.' },\n  { text: 'In motor vehicle trauma, spinal protection is important, but it should not distract from immediately life-threatening injuries.', answer: 'true', feedback: 'EXIT supports balancing spinal movement with time-critical trauma priorities.' },\n  { text: 'A trapped patient should be treated as time-critical until proven otherwise.', answer: 'true', feedback: 'Trapped patients had worse outcomes in the EXIT registry work, so delay should be actively minimised.' },\n  { text: 'Older age alone should exclude a patient from assisted self-extrication.', answer: 'false', feedback: 'Age alone is not the decision point. Assess cognition, ability, pain, injuries, and cooperation.' },\n  { text: 'For an alert, cooperative patient who is not physically trapped, assisted self-extrication may be appropriate.', answer: 'true', feedback: 'EXIT biomechanical work supports considering assisted self-extrication for selected patients.' },\n  { text: 'During self-extrication, very detailed step-by-step instructions are always best.', answer: 'false', feedback: 'EXIT found that over-instruction may increase movement. Short, calm coaching is preferred.' },\n  { text: 'A cervical collar should always delay extrication until it is applied perfectly.', answer: 'false', feedback: 'A collar may be useful if indicated and immediately available, but it should not create unnecessary delay in urgent extrication.' },\n  { text: 'Repeated small movements can matter during extrication, not only the single largest movement.', answer: 'true', feedback: 'EXIT introduced the concept of total travel or cumulative movement.' },\n  { text: 'Communication, analgesia, reassurance, and dignity are part of good extrication care.', answer: 'true', feedback: 'The patient-experience study showed that communication, pain relief, and dignity are important clinical elements during extrication.' }\n];\n\nfunction blank() { return { stmt: {}, revealed: false, picked: null, solved: false }; }\n\nclass Component extends DCLogic {\n  state = {\n    phase: 'intro',\n    studyIndex: 0,\n    knowMore: false,\n    progress: {},\n    finalAnswers: {},\n    finalSubmitted: false\n  };\n\n  toggleKnowMore = () => this.setState(s => ({ knowMore: !s.knowMore }));\n  start = () => this.setState({ phase: 'study', studyIndex: 0 });\n\n  cur(progress, idx) {\n    const p = { ...progress };\n    p[idx] = p[idx] ? { ...p[idx], stmt: { ...p[idx].stmt } } : blank();\n    return p;\n  }\n\n  answerStmt = (idx, si, choice) => this.setState(s => {\n    const p = this.cur(s.progress, idx);\n    p[idx].stmt[si] = choice;\n    return { progress: p };\n  });\n\n  reveal = (idx) => this.setState(s => {\n    const p = this.cur(s.progress, idx);\n    p[idx].revealed = true;\n    return { progress: p };\n  });\n\n  pickOnScene = (idx, oi, correct) => this.setState(s => {\n    if (s.progress[idx] && s.progress[idx].solved) return {};\n    const p = this.cur(s.progress, idx);\n    p[idx].picked = oi;\n    if (correct) p[idx].solved = true;\n    return { progress: p };\n  });\n\n  next = () => this.setState(s => (\n    s.studyIndex >= STUDIES.length - 1 ? { phase: 'final' } : { studyIndex: s.studyIndex + 1 }\n  ));\n\n  setFinal = (qi, val) => this.setState(s => {\n    if (s.finalSubmitted) return {};\n    return { finalAnswers: { ...s.finalAnswers, [qi]: val } };\n  });\n\n  submitFinal = () => this.setState(s => {\n    const perfect = FINAL.every((q, i) => s.finalAnswers[i] === q.answer);\n    if (perfect) {\n      try { window.parent.postMessage({ type: 'complete' }, '*'); } catch (e) {}\n      return { phase: 'complete', finalSubmitted: true };\n    }\n    return { finalSubmitted: true };\n  });\n\n  retryFinal = () => this.setState({ finalSubmitted: false });\n  restart = () => this.setState({ phase: 'intro', studyIndex: 0, knowMore: false, progress: {}, finalAnswers: {}, finalSubmitted: false });\n\n  tfStyle(chosen, isAnswer, graded) {\n    const base = 'flex:1;padding:13px 10px;border-radius:10px;font-size:15px;font-weight:700;font-family:inherit;transition:all .15s;';\n    if (!graded) {\n      if (chosen) return base + 'background:var(--accent,#0F5A5E);color:#fff;border:1px solid var(--accent,#0F5A5E);cursor:pointer;';\n      return base + 'background:#fff;color:#16181C;border:1px solid #D8D3CA;cursor:pointer;';\n    }\n    if (isAnswer) return base + 'background:#E6F1EA;color:#1F5A3C;border:1px solid #2F7A55;cursor:default;';\n    if (chosen) return base + 'background:#F6E7E2;color:#8A3222;border:1px solid #B0432F;cursor:default;';\n    return base + 'background:#F4F1EB;color:#A8A49B;border:1px solid #E2DED6;cursor:default;';\n  }\n\n  renderVals() {\n    const s = this.state;\n    const theme = this.props.theme || ['#0F5A5E', '#0B4448'];\n    const strict = !!this.props.requireStatementMastery;\n    const vals = {\n      isIntro: s.phase === 'intro',\n      isStudy: s.phase === 'study',\n      isFinal: s.phase === 'final',\n      isComplete: s.phase === 'complete',\n      accentMain: theme[0],\n      accentDark: theme[1] || theme[0],\n      knowMore: s.knowMore,\n      knowMoreSign: s.knowMore ? '\\u2013' : '+',\n      toggleKnowMore: this.toggleKnowMore,\n      start: this.start,\n      restart: this.restart\n    };\n\n    const idx = s.studyIndex;\n    const study = STUDIES[idx];\n    const prog = s.progress[idx] || blank();\n\n    vals.studyNum = String(idx + 1).padStart(2, '0');\n    vals.studyTotal = String(STUDIES.length).padStart(2, '0');\n    vals.studyTitle = study.title;\n    vals.studySubtitle = study.subtitle;\n    vals.pdfHref = study.pdf;\n    vals.pdfDownloadName = study.dl;\n    vals.stepDots = STUDIES.map((_, i) => ({ bg: i <= idx ? (theme[0]) : '#DCD8CF' }));\n\n    vals.statements = study.statements.map((st, si) => {\n      const choice = prog.stmt[si];\n      const answered = choice !== undefined;\n      const userCorrect = answered && choice === st.correct;\n      const userWrong = answered && !userCorrect;\n      const needsRetry = strict && userWrong;\n      return {\n        idxLabel: String(si + 1),\n        text: st.text,\n        showButtons: !answered || needsRetry,\n        answered,\n        userCorrect,\n        userWrong,\n        retryHint: needsRetry,\n        verdictLabel: LBL[st.correct],\n        feedback: st.feedback,\n        onBacked: () => this.answerStmt(idx, si, 'backed'),\n        onNotBacked: () => this.answerStmt(idx, si, 'notbacked')\n      };\n    });\n\n    const allAnswered = study.statements.every((_, si) => prog.stmt[si] !== undefined);\n    const allCorrect = study.statements.every((st, si) => prog.stmt[si] === st.correct);\n    const satisfied = strict ? allCorrect : allAnswered;\n    vals.notRevealed = !prog.revealed;\n    vals.revealed = prog.revealed;\n    vals.canReveal = satisfied && !prog.revealed;\n    vals.revealLocked = !satisfied && !prog.revealed;\n    vals.doReveal = () => this.reveal(idx);\n\n    vals.keyFindings = study.keyFindings.map((k, i) => ({ n: String(i + 1), text: k }));\n\n    vals.onSceneOptions = study.options.map((o, oi) => {\n      const picked = prog.picked === oi;\n      const solved = prog.solved;\n      return {\n        letter: 'ABCD'[oi],\n        text: o.text,\n        correctGreen: solved && o.correct,\n        wrongRed: !solved && picked && !o.correct,\n        neutral: !(solved && o.correct) && !(!solved && picked && !o.correct),\n        onSelect: () => this.pickOnScene(idx, oi, o.correct)\n      };\n    });\n    vals.onSceneSolved = prog.solved;\n    vals.onSceneTriedWrong = prog.picked !== null && prog.picked !== undefined && !prog.solved;\n\n    vals.isLastStudy = idx === STUDIES.length - 1;\n    vals.nextLabel = idx === STUDIES.length - 1 ? 'Continue to Final Check' : 'Next Study';\n    vals.nextReady = prog.solved;\n    vals.nextDisabled = !prog.solved;\n    vals.next = this.next;\n\n    const graded = s.finalSubmitted;\n    const finalAllAnswered = FINAL.every((q, i) => s.finalAnswers[i] !== undefined);\n    const finalPerfect = FINAL.every((q, i) => s.finalAnswers[i] === q.answer);\n    vals.finalQuestions = FINAL.map((q, i) => {\n      const ans = s.finalAnswers[i];\n      const correct = ans === q.answer;\n      return {\n        n: String(i + 1),\n        text: q.text,\n        locked: graded,\n        onTrue: () => this.setFinal(i, 'true'),\n        onFalse: () => this.setFinal(i, 'false'),\n        trueStyle: this.tfStyle(ans === 'true', q.answer === 'true', graded),\n        falseStyle: this.tfStyle(ans === 'false', q.answer === 'false', graded),\n        showFeedback: graded && ans !== undefined && !correct,\n        feedback: q.feedback\n      };\n    });\n    vals.submitReady = finalAllAnswered && !graded;\n    vals.submitLocked = !finalAllAnswered && !graded;\n    vals.finalShowRetry = graded && !finalPerfect;\n    vals.finalScore = FINAL.filter((q, i) => s.finalAnswers[i] === q.answer).length;\n    vals.submitFinal = this.submitFinal;\n    vals.retryFinal = this.retryFinal;\n\n    return vals;\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
